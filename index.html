<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나도 고양이 있어</title>
    <link rel="stylesheet" href="./src/styles/app.css" />
  </head>
  <body>
    <main class="app" data-app-state="idle">
      <form class="cat-controls" aria-label="고양이 설정">
        <label class="cat-name-field">
          <span class="cat-name-field__label">이름</span>
          <input
            class="cat-name-field__input"
            data-cat-name-input
            type="text"
            maxlength="16"
            autocomplete="off"
          />
        </label>
        <label class="cat-name-field">
          <span class="cat-name-field__label">품종</span>
          <select class="cat-name-field__input" data-cat-breed-select>
            <option value="domestic">코리안 숏헤어</option>
            <option value="fold">폴드</option>
            <option value="bobtail">짧은 꼬리</option>
          </select>
        </label>
        <label class="cat-name-field">
          <span class="cat-name-field__label">눈</span>
          <select class="cat-name-field__input" data-cat-eye-color-select>
            <option value="green">초록</option>
            <option value="gold">금색</option>
            <option value="blue">파랑</option>
          </select>
        </label>
      </form>
      <div class="cat-stage" aria-label="고양이 영역">
        <div
          class="cat"
          data-cat-state="idle"
          data-cat-direction="right"
          data-cat-pointer-state="outside"
          data-cat-name="고양이"
          data-cat-breed="domestic"
          data-cat-eye-color="green"
          aria-label="고양이"
        >
          <span class="cat__name" data-cat-name-label>고양이</span>
          <span class="cat__sprite">
            <span class="cat__ear cat__ear--left"></span>
            <span class="cat__ear cat__ear--right"></span>
            <span class="cat__face">
              <span class="cat__eye cat__eye--left"></span>
              <span class="cat__eye cat__eye--right"></span>
              <span class="cat__nose"></span>
            </span>
            <span class="cat__tail"></span>
            <span class="cat__paw cat__paw--front"></span>
            <span class="cat__paw cat__paw--back"></span>
          </span>
        </div>
      </div>
    </main>
    <script src="./src/renderer.js"></script>
  </body>
</html>
